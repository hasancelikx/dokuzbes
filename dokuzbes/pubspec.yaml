name: dokuzbes
description: Dokuzbes - Digital Casino Live Streaming Platform.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.0.0
  
  # Networking
  http: ^1.1.0
  socket_io_client: ^2.0.1
  
  # Storage
  shared_preferences: ^2.2.0
  
  # JWT
  dart_jsonwebtoken: ^2.12.0
  
  # Models & Serialization
  json_serializable: ^6.7.0
  json_annotation: ^4.8.0
  
  # Validation
  validators: ^3.0.0
  
  # UI
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  flutter_staggered_grid_view: ^0.7.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  lottie: ^2.6.0
  
  # Video
  video_player: ^2.8.0
  agora_rtc_engine: ^6.3.0
  
  # Logging
  logger: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true

  # assets:
  #   - assets/images/
  #   - assets/icons/
  #   - assets/animations/
